services:
  postgres:
    image: postgres:16-alpine
    container_name: autogpt-postgres
    environment:
      POSTGRES_USER: autogpt
      POSTGRES_PASSWORD: autogpt
      POSTGRES_DB: autogpt_dashboard
    ports:
      - "5432:5432"
    volumes:
      - autogpt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autogpt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autogpt_pgdata:
